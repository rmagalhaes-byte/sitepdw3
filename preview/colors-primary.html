<!doctype html><html><head><meta charset="utf-8"><title>Primary palette</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .pal { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw {
    border-radius: 12px;
    padding: 14px;
    aspect-ratio: 1.4 / 1;
    display: flex; flex-direction: column; justify-content: space-between;
    border: 1px solid rgba(0,0,0,0.04);
  }
  .sw .name { font-size: 12px; font-weight: 700; letter-spacing: -0.01em; }
  .sw .hex  { font-size: 11px; font-family: ui-monospace, Menlo, monospace; opacity: 0.85; }
  .on-dark .name, .on-dark .hex { color: #fff; }
</style>
<div class="pal">
  <div class="sw on-dark" style="background:#006c4b"><div class="name">Green 700</div><div class="hex">#006c4b · primary</div></div>
  <div class="sw on-dark" style="background:#009668"><div class="name">Green 600</div><div class="hex">#009668 · gradient</div></div>
  <div class="sw on-dark" style="background:#22A66B"><div class="name">Green 500</div><div class="hex">#22A66B · dark-mode</div></div>
  <div class="sw"      style="background:#dcfce7"><div class="name">Green 50</div><div class="hex">#dcfce7 · status-ok bg</div></div>
  <div class="sw"      style="background:rgba(0,108,75,0.08)"><div class="name">Green tint</div><div class="hex">rgba(0,108,75,.08)</div></div>
</div>
</body></html>
