<!doctype html><html><head><meta charset="utf-8"><title>Motion & easing</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 24px; }
  .stack { display: grid; gap: 14px; }
  .row { display: grid; grid-template-columns: 180px 1fr 200px; align-items: center; gap: 14px; }
  .name { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color:#181c1e; font-weight: 600; }
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color:#3d4a42; }
  .track { position: relative; height: 14px; background:#f0f5f3; border-radius: 999px; overflow: hidden; }
  .dot { position: absolute; left: 0; top: 1px; width: 12px; height: 12px; border-radius: 50%; background:#006c4b; }
  @keyframes spring   { 0%,8%{left:0%} 92%,100%{left:calc(100% - 12px)} }
  @keyframes outsoft  { 0%,8%{left:0%} 92%,100%{left:calc(100% - 12px)} }
  @keyframes modalE   { 0%,8%{left:0%} 92%,100%{left:calc(100% - 12px)} }
  .a .dot { animation: spring 3s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .b .dot { animation: outsoft 3s infinite cubic-bezier(0.22, 1, 0.36, 1); }
  .c .dot { animation: modalE 3s infinite cubic-bezier(0.16, 1, 0.3, 1); }
</style>
<div class="stack">
  <div class="row a"><div class="name">spring</div><div class="track"><div class="dot"></div></div><div class="meta">.175 .885 .32 1.275 — logo / image</div></div>
  <div class="row b"><div class="name">out-soft</div><div class="track"><div class="dot"></div></div><div class="meta">.22 1 .36 1 — scroll reveals</div></div>
  <div class="row c"><div class="name">modal</div><div class="track"><div class="dot"></div></div><div class="meta">.16 1 .3 1 — modal slide-up</div></div>
</div>
</body></html>
