<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .stack { display: grid; gap: 8px; }
  .bar { display: flex; align-items: center; gap: 14px; }
  .swatch { height: 14px; background:#006c4b; border-radius: 3px; }
  .name { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color:#3d4a42; min-width: 130px; }
</style>
<div class="stack">
  <div class="bar"><span class="name">--pdw-space-1 · 4px</span><span class="swatch" style="width:4px"></span></div>
  <div class="bar"><span class="name">--pdw-space-2 · 8px</span><span class="swatch" style="width:8px"></span></div>
  <div class="bar"><span class="name">--pdw-space-3 · 12px</span><span class="swatch" style="width:12px"></span></div>
  <div class="bar"><span class="name">--pdw-space-4 · 16px</span><span class="swatch" style="width:16px"></span></div>
  <div class="bar"><span class="name">--pdw-space-6 · 24px</span><span class="swatch" style="width:24px"></span></div>
  <div class="bar"><span class="name">--pdw-space-8 · 32px ★</span><span class="swatch" style="width:32px"></span></div>
  <div class="bar"><span class="name">--pdw-space-10 · 40px</span><span class="swatch" style="width:40px"></span></div>
  <div class="bar"><span class="name">--pdw-space-12 · 48px</span><span class="swatch" style="width:48px"></span></div>
  <div class="bar"><span class="name">--pdw-space-16 · 60px</span><span class="swatch" style="width:60px"></span></div>
</div>
</body></html>
