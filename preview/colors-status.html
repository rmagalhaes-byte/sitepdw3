<!doctype html><html><head><meta charset="utf-8"><title>Status pills</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .pill {
    display: inline-flex; align-items: center;
    font-size: 12px; font-weight: 500;
    border-radius: 999px;
    padding: 4px 10px;
  }
  .ok { color:#0d6a3d; background:#dcfce7; }
  .dev{ color:#92400e; background:#fef3c7; }
  .rd { color:#1e3a8a; background:#dbeafe; }
  .row { gap: 14px; flex-wrap: wrap; }
  .meta { font-size: 11px; color: var(--pdw-text-muted); margin-top: 4px; }
</style>
<div class="row">
  <div class="col" style="gap:4px"><span class="pill ok">Disponível</span><span class="meta">.status-ok · #dcfce7 / #0d6a3d</span></div>
  <div class="col" style="gap:4px"><span class="pill dev">Em desenvolvimento</span><span class="meta">.status-dev · #fef3c7 / #92400e</span></div>
  <div class="col" style="gap:4px"><span class="pill rd">Pesquisa</span><span class="meta">.status-rd · #dbeafe / #1e3a8a</span></div>
  <div class="col" style="gap:4px"><span class="pill" style="background:rgba(56,189,248,0.1);color:#38bdf8;border:1px solid rgba(56,189,248,0.2);font-weight:600">v1.7.3</span><span class="meta">Version badge (header)</span></div>
</div>
</body></html>
