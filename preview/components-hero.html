<!doctype html><html><head><meta charset="utf-8"><title>Hero treatment</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 0; margin: 0; background:#f7fafc; }
  .hero {
    background:#fff;
    border: 1px solid rgba(0,108,75,0.10);
    border-radius: 14px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.05);
    padding: 40px;
    margin: 18px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 32px;
    overflow: hidden;
    position: relative;
  }
  .hero::before {
    content: ''; position: absolute; top: -40%; right: -10%;
    width: 460px; height: 460px;
    background: radial-gradient(circle, rgba(0,108,75,0.10) 0%, rgba(255,255,255,0) 70%);
    border-radius: 50%; z-index: 0;
  }
  .hero-content { flex: 1; max-width: 560px; position: relative; z-index: 1; }
  h1 {
    margin: 0 0 14px; font-size: 38px; line-height: 1.1; letter-spacing: -0.02em; font-weight: 700;
    background: linear-gradient(135deg,#006c4b 0%,#1a3b5d 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { margin: 0 0 6px; font-size: 18px; font-weight: 600; color:#006c4b; }
  .desc { margin: 0 0 20px; color:#3d4a42; font-size: 15px; line-height: 1.6; max-width: 480px; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .cta { background: linear-gradient(135deg,#006c4b 0%,#009668 100%); color:#fff; border:0; border-radius:8px; padding:11px 18px; font-weight: 600; font-size: 14px; box-shadow: 0 8px 20px rgba(0,108,75,0.3); cursor:pointer; }
  .secondary { background:#fff; border:1px solid #d1d9e0; color:#181c1e; border-radius: 8px; padding: 11px 18px; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
  .hero-img { flex: 0 0 240px; position: relative; z-index: 1; }
  .hero-img img { width: 240px; height: auto; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,108,75,0.15); }
</style>
<div class="hero">
  <div class="hero-content">
    <h1>Acesso a serviços digitais sem fricção.</h1>
    <p class="sub">As suas credenciais. Um clique. Qualquer serviço.</p>
    <p class="desc">A PDW é a sua ferramenta para utilizar credenciais digitais em serviços do mundo real, eliminando formulários repetitivos.</p>
    <div class="btn-row">
      <button class="cta">Ver demonstração</button>
      <a class="secondary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Obter a App</a>
    </div>
  </div>
  <div class="hero-img"><img src="../assets/Imagem-home.png" alt=""></div>
</div>
</body></html>
