<!doctype html><html><head><meta charset="utf-8"><title>Radius scale</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .row { gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box {
    width: 78px; height: 78px;
    background: #fff;
    border: 1px solid #d1d9e0;
  }
  .label { font-size: 11px; color: #3d4a42; font-family: ui-monospace, Menlo, monospace; text-align: center; }
</style>
<div class="row">
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="label">6 · sm<br>trust logo</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">8 · md<br>button/input</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="label">12 · lg<br>credential</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="label">14 · xl<br>section-card ★</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="label">16 · 2xl<br>modal</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="label">20 · 3xl<br>video</div></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><div class="label">24 · card<br>simulator</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="label">999 · pill<br>status</div></div>
</div>
</body></html>
