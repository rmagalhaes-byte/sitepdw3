<!doctype html><html><head><meta charset="utf-8"><title>Header</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 0; background: #f7fafc; }
  .site-header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(0,108,75,0.10);
  }
  .inner { width: min(1120px, 96%); margin: 0 auto; min-height: 72px; display:flex; align-items:center; justify-content:space-between; gap:24px; padding: 0 16px; }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .brand img { width:32px; height:32px; border-radius: 6px; filter: drop-shadow(0 2px 6px rgba(0,108,75,0.15)); }
  .brand span { font-weight:800; color:#006c4b; font-size:1.05rem; letter-spacing:-0.02em; }
  nav { display:flex; gap:20px; font-size:14px; font-weight:500; align-items:center; }
  nav a { color:#181c1e; opacity:0.8; text-decoration:none; }
  nav a.active { color:#006c4b; font-weight:700; border-bottom: 2px solid #006c4b; padding-bottom: 4px; }
  .ver { padding: 2px 8px; background: rgba(56,189,248,0.10); color:#38bdf8; border-radius: 12px; font-size: 11px; font-weight: 600; border: 1px solid rgba(56,189,248,0.2); }
  .right { display:flex; align-items:center; gap:10px; }
  .lang { font-size:12px; font-weight:600; color:#3d4a42; }
  .cta { background:#006c4b; color:#fff; border:0; border-radius:8px; padding:10px 14px; font-weight:600; font-size:14px; }
  .bg { padding: 40px 0; background: linear-gradient(180deg,#f7fafc 0%,#eef4f1 100%); }
</style>
<div class="site-header">
  <div class="inner">
    <a class="brand"><img src="../assets/pdw_logo.png" alt=""><span>Portuguese Digital Wallet</span></a>
    <nav>
      <a class="active">Home</a><a>Sobre</a><a>Solução</a><a>Casos de Uso</a><a>Contactos</a>
      <span class="ver">v1.7.3</span>
    </nav>
    <div class="right"><span class="lang">EN</span><button class="cta">Obter a App</button></div>
  </div>
</div>
<div class="bg"></div>
</body></html>
