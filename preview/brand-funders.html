<!doctype html><html><head><meta charset="utf-8"><title>Funder lockup</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 24px; }
  .funders {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,108,75,0.06);
    border-radius: 20px;
    padding: 24px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color:#3d4a42; opacity: 0.7; }
  .logos { display:flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; }
  .logo { width: 140px; height: 48px; mix-blend-mode: multiply; }
  .logo img { width: 100%; height: 100%; object-fit: contain; filter: grayscale(30%) opacity(0.85); }
</style>
<div class="funders">
  <div class="label">Financiado por</div>
  <div class="logos">
    <div class="logo"><img src="../assets/PRR.png" alt="PRR"></div>
    <div class="logo"><img src="../assets/RP.png" alt="República Portuguesa"></div>
    <div class="logo"><img src="../assets/FEU.png" alt="União Europeia"></div>
  </div>
</div>
</body></html>
