<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  table { width: 100%; border-collapse: collapse; font-family: var(--pdw-font-sans); }
  td { padding: 8px 12px; vertical-align: baseline; border-bottom: 1px dashed #e5ebef; }
  td.spec { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #3d4a42; white-space: nowrap; text-align: right; width: 1%; }
  .a { font-size: 42px; line-height: 1; letter-spacing: -0.02em; font-weight: 700; }
  .b { font-size: 28px; line-height: 1.2; letter-spacing: -0.01em; font-weight: 800; }
  .c { font-size: 24px; line-height: 1.3; font-weight: 700; color:#006c4b; }
  .d { font-size: 20px; font-weight: 600; color:#006c4b; }
  .e { font-size: 16px; color:#3d4a42; line-height: 1.6; }
  .f { font-size: 14px; color:#3d4a42; }
  .g { font-size: 12px; color:#3d4a42; }
  .h { font-size: 11px; color:#006c4b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; }
</style>
<table>
  <tr><td class="a">Aa</td><td class="spec">H1 · 42 / 1.1 / 700 / -0.02em</td></tr>
  <tr><td class="b">Aa</td><td class="spec">H2 · 28 / 1.2 / 800 / -0.01em</td></tr>
  <tr><td class="c">Aa</td><td class="spec">H3 · 24 / 1.3 / 700 · green</td></tr>
  <tr><td class="d">Aa</td><td class="spec">Hero subtitle · 20 / 600 · green</td></tr>
  <tr><td class="e">Aa</td><td class="spec">Body · 16 / 1.6 · muted</td></tr>
  <tr><td class="f">Aa</td><td class="spec">Small · 14 · muted</td></tr>
  <tr><td class="g">Aa</td><td class="spec">Micro · 12 · muted</td></tr>
  <tr><td class="h">Aa</td><td class="spec">Eyebrow · 11 / 700 · 0.12em</td></tr>
</table>
</body></html>
