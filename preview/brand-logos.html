<!doctype html><html><head><meta charset="utf-8"><title>Logos</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 22px 24px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .tile {
    background:#fff;border:1px solid #d1d9e0;border-radius: 12px;
    display:flex; flex-direction: column; align-items:center; justify-content:center;
    padding: 14px; gap: 10px; min-height: 100px;
  }
  .tile img { max-width: 100%; max-height: 44px; object-fit: contain; }
  .name { font-size: 10.5px; color:#3d4a42; font-family: ui-monospace, Menlo, monospace; text-align: center; }
  .brandtile { background: #006c4b; }
  .brandtile .name { color: #fff; opacity: 0.85; }
</style>
<div class="grid">
  <div class="tile brandtile"><img src="../assets/pdw_logo.png" alt="PDW"><div class="name">PDW · primary</div></div>
  <div class="tile"><img src="../assets/pdw_logo.png" alt="PDW"><div class="name">PDW · on light</div></div>
  <div class="tile"><img src="../assets/tcminho-logo.png" alt="TecMinho"><div class="name">TecMinho · coord</div></div>
  <div class="tile"><img src="../assets/uminho_logo.png" alt="U.Minho"><div class="name">U.Minho</div></div>
  <div class="tile"><img src="../assets/logo-Blockchain-pt.png" alt="Blockchain.PT"><div class="name">Blockchain.PT</div></div>
  <div class="tile"><img src="../assets/logo-void.png" alt="VOID"><div class="name">VOID · lead</div></div>
  <div class="tile"><img src="../assets/logo-ebsi.png" alt="EBSI"><div class="name">EBSI</div></div>
  <div class="tile"><img src="../assets/logo-dax.png" alt="DAX"><div class="name">DAX</div></div>
</div>
</body></html>
