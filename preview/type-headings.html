<!doctype html><html><head><meta charset="utf-8"><title>Headings</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  h2 { margin: 0; font-size: 28px; line-height: 1.2; letter-spacing: -0.01em; font-weight: 800; }
  h3 { margin: 0; font-size: 24px; line-height: 1.3; font-weight: 700; color: #006c4b; }
  .meta { font-size: 11px; color: var(--pdw-text-muted); font-family: ui-monospace, Menlo, monospace; margin-top:4px; }
  .stack { display: grid; gap: 16px; }
</style>
<div class="stack">
  <div><h2>Casos de uso prioritários</h2><div class="meta">H2 · 28 / 1.2 · -0.01em · 800</div></div>
  <div><h3>O que é uma carteira digital?</h3><div class="meta">H3 · 24 / 1.3 · 700 · primary green</div></div>
</div>
</body></html>
