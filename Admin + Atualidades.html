<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDW · Admin + Atualidades — Mockup hi-fi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0e1413; font-family: "Public Sans", system-ui, sans-serif; color: #f7fafc; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="feed/shared.jsx"></script>
  <script type="text/babel" src="feed/atualidades-screen.jsx"></script>
  <script type="text/babel" src="feed/admin-screen.jsx"></script>
  <script type="text/babel" src="feed/browser-window.jsx"></script>
  <script type="text/babel" src="feed/design-canvas.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, ChromeWindow } = window;

    const FramedScreen = ({ url, title, width, height, children }) => (
      <ChromeWindow
        url={url}
        tabs={[{ title, active: true }]}
        width={width}
        height={height}
      >
        <div style={{ height: "100%", overflow: "auto" }}>
          {children}
        </div>
      </ChromeWindow>
    );

    const App = () => (
      <DesignCanvas
        title="PDW · Admin + Feed de Atualidades"
        subtitle="Mockup hi-fi · clica em qualquer artboard para focar · escolhe tabs no /admin · filtros e view mode no /atualidades"
      >
        <DCSection id="public" title="Página pública · /atualidades" subtitle="Disruptivo: stories + filtros animados + bento mural">
          <DCArtboard id="ab-feed" label="Feed (default)" width={1320} height={1520}>
            <FramedScreen url="digitalwallet.pt/pt/atualidades" title="Atualidades · PDW" width={1320} height={1520}>
              <AtualidadesScreen />
            </FramedScreen>
          </DCArtboard>
        </DCSection>

        <DCSection id="admin" title="Painel admin · /admin" subtitle="Smart compose · cola URL → embed automático · biblioteca de media + logos">
          <DCArtboard id="ab-admin" label="Admin · gestão de feed" width={1320} height={1180}>
            <FramedScreen url="digitalwallet.pt/pt/admin" title="Admin · PDW" width={1320} height={1180}>
              <AdminScreen />
            </FramedScreen>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
